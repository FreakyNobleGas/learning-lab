services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: adk
      POSTGRES_PASSWORD: adk_secret
      POSTGRES_DB: adk_sessions
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U adk -d adk_sessions"]
      interval: 5s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    # Start the server, wait for it to be ready, then pull the model.
    # The pull is skipped automatically if the model is already in the volume.
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        ollama serve &
        until ollama list >/dev/null 2>&1; do sleep 1; done
        ollama pull llama3.2
        wait
    healthcheck:
      test: ["CMD-SHELL", "ollama list | grep -q llama3.2"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s

volumes:
  postgres_data:
  ollama_data:
